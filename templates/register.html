{% extends "base.html" %}
{% block title %}Регистрация | Routsol Web{% endblock %}

{% block head_extra %}
<style>
.auth-container { max-width: 420px; margin: 40px auto; }
.auth-header { text-align: center; margin-bottom: 28px; }
.auth-icon { font-size: 2.8rem; color: var(--success); margin-bottom: 10px; display: block; }
.auth-header h1 { margin: 0 0 6px; color: var(--text); font-size: 1.5rem; font-weight: 800; }
.auth-header p { color: var(--text-muted); margin: 0; font-size: 0.9rem; }
.auth-form { display: flex; flex-direction: column; gap: 16px; }
.auth-form .form-group { display: flex; flex-direction: column; gap: 5px; }
.auth-form label { font-weight: 500; color: var(--text-secondary); font-size: 0.88rem; }
.auth-form label i { margin-right: 5px; color: var(--success); }
.optional { color: var(--text-muted); font-weight: 400; font-size: 0.8rem; }
.auth-form input {
    padding: 10px 13px;
    background: var(--bg-input);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 0.95rem;
    font-family: inherit;
    transition: border-color 0.18s, box-shadow 0.18s;
}
.auth-form input:focus { outline: none; border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--primary-light); }
.auth-form input::placeholder { color: var(--text-muted); }
.auth-footer { text-align: center; margin-top: 18px; color: var(--text-muted); font-size: 0.88rem; }
.auth-footer a { color: var(--primary); font-weight: 500; }
.auth-footer a:hover { text-decoration: underline; }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="card">
        <div class="auth-header">
            <i class="fas fa-user-plus auth-icon"></i>
            <h1>Создать аккаунт</h1>
            <p>Зарегистрируйтесь, чтобы сохранять историю рекомендаций</p>
        </div>
        <form method="POST" action="{{ url_for('register') }}" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Имя пользователя</label>
                <input type="text" id="username" name="username" required
                       placeholder="Придумайте имя пользователя"
                       value="{{ request.form.get('username', '') }}">
            </div>
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email <span class="optional">(необязательно)</span></label>
                <input type="email" id="email" name="email" placeholder="your@email.com"
                       value="{{ request.form.get('email', '') }}">
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Пароль</label>
                <input type="password" id="password" name="password" required placeholder="Минимум 8 символов">
            </div>
            <div class="form-group">
                <label for="password2"><i class="fas fa-lock"></i> Повторите пароль</label>
                <input type="password" id="password2" name="password2" required placeholder="Повторите пароль">
            </div>
            <button type="submit" class="btn btn-primary btn-block" style="margin-top:4px;">
                <i class="fas fa-user-plus"></i> Зарегистрироваться
            </button>
        </form>
        <div class="auth-footer">
            Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a>
        </div>
    </div>
</div>
{% endblock %}
